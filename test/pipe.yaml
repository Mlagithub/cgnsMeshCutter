partition:
  tool: parmetis
  nprocs: 2 #并行处理器数量/网格划分份数

geometry:   #输入几何相关信息
  geometryTest: 2

mesh:
  fileName: pipe.cgns #网格数据文0
  fileType: cgns
  dimension: 3
  scaleFactor:
    x: 1.0
    y: 1.0
    z: 1.0

physics:
  state: steady #/transient，确定模拟类型是瞬态还是稳态
  gravity: 
    x: 0
    y: 0
    z: -9.18
  model: incompressible # compressible, multiphase, ...
  turbulenceModel: 
    type: laminar  #laminar, rans:kEpsilon, RealizablekEpsilon, RNGkEpsilon,kOmega, BSLkOmega, SSTkOmega; les:SmagorinskyLilly, Smagorinsky, kEqu
    komegaOption: blended #blended, wallfunction
    wallFunction: standard #standard, scalable, spaldingwallfunction
    lowReynoldsNumberCorrection: switchoff #switchon, switchoff
  temperature: turnOff
  modelConstants:
    kE0: 0.09 #定义Cmu，用于计算湍流粘性系数
    kE1: 1.44 #定义C1_epsilon，epsilon方程常数
    kE2: 1.92 #定义C2_epsilon，epsilon方程常数
    kE3: 1.0  #定义sigma_k,（k方程Pr数），用于计算k方程中有效粘性系数
    kE4: 1.3  #定义sigma_epsilon，（epsilon方程Pr数）用于计算epsilon方程中有效粘性系数
    kE5: 0.85 #定义sigma_energy，（能量方程Pr数）用于能量方程中由于湍流输运引起的能量扩散
    kE6: 0.85 #定义sigma_wall，壁面附近的湍流普朗特数，
    KOmega_Alpha*_inf: 1.0
    KOmega_Alpha_inf: 0.52
    KOmega_Beta*_inf: 0.09
    KOmega_Beta_i: 0.072
    KOmega_SigmaK: 2.0 
    KOmega_SigmaOmega: 2.0
    KOmega_CAlpha1: 0.5532  #BSLkomega 0.5976, SSTkomega 0.5532 standard 0.556
    KOmega_CBeta1: 0.075
    KOmega_BetaStar: 0.09
    KOmega_SigmaK1: 1.176 #BSLkomega 2, SSTkomega 1.176 standard 2
    KOmega_SigmaOmega1: 2.0 
    KOmega_SigmaK2: 1.0
    KOmega_SigmaOmega2: 1.168
    KOmega_Betai1: 0.075
    KOmega_Betai2: 0.0828
  material: air
  refPressure: 0.1 # MPa,指定参考压力为1个大气压，有利于减少压差变化较小时，计算产生的舍入误差
  refDensity: 1.25 # kg/m3
  refTemperature: 298.16 # K ,确定参考温度为25度，便于确定热力学比焓、比熵，计算流体内能
  refSpecificEnthalpy: 0 #J/kg,设置参考状态比焓
  refSpecificEntropy: 0 # J/(kg K)设置参考状态比熵
  stateEquation: generalMaterial # 对于非理想介质，需要同时定义密度与摩尔分子量从而确定压力
  molarMass: 28.96 # kg/kmol,分子摩尔质量
  density: 1
  viscosity: 0.00001 #kg/(m s)，动力粘度 
  heatCapacity: #J/(kg K),比热容 Cp
    type: value #[property, value]
    value: 1004.4 
  fluidProperty:
    type: userDefined #[coolProp, if97, userDefined]
    material:  
  heatConductivity: 0.0261 # W/(m K)

boundary:
  definedBoundary:
  - flowIn
  - flowOut
  - wall

  flowIn:
    type: inlet
    patchName: INLET #设置该边界对应的网格面
    massAndMoment: velocity #还有其他2种方式进行选择，massFlow和pressure
    velocity:    #设置入口边界速度为抛物线分布，其中R为圆管半径，则速度分布与几何坐标有关
      type: xyz  #[xyz,func]
      x: 0.0
      y: 0.0
      z: 2.0    # 指定速度大小，其方向默认与边界面垂直
      func: 
        file: ./05_full_develop_velocity_laminar.cpp
        name: updateBdy
    massFlow: 
      massFlowRate: 0.5 # kg/s,方向默认与边界面垂直
    pressure: 
      type: staticPressure #[totalPressure, staticPressure]
      totalPressure: 1.0 # Pa, kg/(s2 m)，一般入口压力边界设置为总压
      staticPressure: 1.0
    energy:
      temperature: 300 #涉及能量方程时，设置入口温度
    turbulence: intensity_hydraulicDiameter #设置入口边界湍流相关物理量，还有给定intensity_viscosityRatio，intensity_lengthScale，k_epsilon，k_omega
    intensity_hydraulicDiameter:
      tur_intensity_hD: 0.05 #设置入口湍流强度和等效水力直径，确定k、epsilon值
      tur_hydraulicDiameter: 0.4
    viscosityRatio:
      tur_viscosityRatio: 10
    intensity_lengthScale:
      tur_intensity_lS: 0.05
      tur_lengthScale: 1 # m,设置湍流强度和湍流特征长度
    k_epsilon:
      type: value #[func,value]
      kinetic_kE: 1 # m2/s2，kineticEnergy
      epsilon: 1 # m2/s3,直接设置入口湍流动能k和湍流耗散率epsilon
      func:
        file_k: ./
        name_k: k
        file_epsilon: ./
        name_epsilon: epsilon
    k_omega:
      kinetic_kO: 1 # m2/s2，
      omega: 1  #直接设置入口湍流动能k和omega

  flowOut:
    type: outlet
    patchName: OUTLET
    massAndMoment: pressure # 还有其他选项outflow
    pressure:
      totalPressure: 0.0
      staticPressure: 0 # 指定静压大小，其方向默认与边界面垂直
    outflow:
      flowRateWeighting: 1 # 出口达到充分发展，各物理量梯度为0

  wall:
    type: wall
    patchName: WALL
    massAndMoment: translationVelocity
    translationVelocity: # 平行移动
      x: 0.0
      y: 0.0   # 各个方向运动速度大小
      z: 0.0
    rotationalVelocity:  # 旋转运动
      speed: 0 # 单位 rad/s
      rotationAxisOrigin:
        x: 0
        y: 0 # 绕z轴旋转
        z: 0 
      rotationAxisDirection:
        x: 0
        y: 0 # 绕z轴旋转
        z: 0 
    wallShear: noSlip # 设置壁面剪切力计算方式
    noSlip:  #设置壁面附近流体速度，壁面静止时，壁面边界处流体速度为0；壁面运动时，壁面边界处流体速度与壁面运动速度一样
      x: 0.0
      y: 0.0
      z: 0.0
    specifiedShear: #当设置x，y，z方向壁面剪切力为0时，表示自由滑移壁面
      x: 0.0
      y: 0.0 #直接指定壁面剪切力时，不会使用壁面函数计算得到的壁面剪切力
      z: 0.0     
    wallRoughness: 0.5  #考虑壁面粗糙度对壁面附近剪切力和传热的影响
    wallThermal: heatFlux
    heatFlux: 1000.0 ##根据壁面是否涉及能量输运，设置wallThermal
    temperature: 0

algorithm:
  name: SIMPLE #SIMPLE # OR PISO、simplec、coupled等，SIMPLE处理稳态，PISO处理瞬态
  correctionNum: 1 # OpenFOAM中SIMPLE算法在一个迭代步中仅校正1次，而PISO校正步一般不超过4次
  nonOrthogonalCorrectionNum: 16 #对于矩形网格设置为0；对于非正交网格，设置校正步数。
  convergenceTol: 1e-6

discrete:
  method: fvm #离散方法，fvm，fem，fdm等
  time: backwardEuler # backwardEuler/secondBackwardEuler(两者均为隐式格式，cfx中仅适用这两种时间离散格式)/时间项，稳态时无此项
  momentumDivergence: upwind # upwind，secondUpwind,quick,muscl等.散度项，即对流项：▽ 算子与向量（矩阵）点乘。
  turbulenceDivergence: upwind # upwind，secondUpwind,quick,muscl等.散度项，即对流项：▽ 算子与向量（矩阵）点乘。
  laplacian: GaussLinear # centralDifference 。拉普拉斯项（二阶导数），即扩散项， 
  gradient: GaussCellBased # GaussCellBased, GaussNodeBased,LeastSquares等。梯度项，如▽P
  skewness: 0
  pressure: linear #SecondOrder, linear

control:
  relaxationFactor: 
    pressure: 0.3
    momentum: 0.7
    energy: 1
    turbulentKineticEnergy: 0.8
    turbulentDissipationRate: 0.8
  totalTime: 0.1
  timeStep: 0.1
  iterationNumber: 200 #每一时间步迭代步数
  maxIterations: 50000 #最大迭代次数
  outputResultFileFormat: vtk #[vtk, tecplot] 
  outputResultFilePostfix: ""
  outputControl: timeInterval # timeInterval等
  outputInterval: 100 # 每隔20个时间步输出数据
  outputVariables: pressure # velocity、Reynolds、Temperature、eddyViscosity等
  outputFomat: binary # 输出格式
  outputPrecision: double # 输出精度
  outputPath: ./
  monitor: 
    status: 0 #[true=1, false=0]
    device: jpeg #[jpeg, x11]
    figName: residual.jpg #[output fileName(absolute/relative path)]
    figTitle: Residual #[set the graph title (default "Data Monitoring")
    figSize: 640,480 #set the size of the output plot, format "640,480"
    isYAxisLogScale: 1 #[true=1, false=0]
    idle: 60 # stops if <file> unchanging for <time> sec
    refresh: 1 # refreshes display every <time> sec

solver: #线性求解器参数
  CoupleEquation:
    orderType: varOrder #[varOrder, cellOrder]
    coupleType: velocityPressure #[velocityPressure, velocityPressureTemperature]
    type: bcgs #gaussSeidel,jaccob, pcg, amg,petsc 等
    options:
      kspType: bcgs
      pcType: gamg
      amgType: agg
      tolerance: 1e-12
  pEquation:
    type: petsc #gaussSeidel,jaccob, pcg, amg等
    options:
      kspType: bcgs
      pcType: gamg
      amgType: agg
      tolerance: 1e-8
  UEquation: 
    type: petsc #gaussSeidel,jaccob, pcg, amg等
    options:
      kspType: gmres ##gmres, pipefgmres, bcgs, cg, pipecgrr, pipefcg
      pcType: gamg
      amgType: agg
      tolerance: 1e-9    
  TEquation:  #包含温度，湍流模型等其他所有标量方程的求解
    type: amg #jaccob, pcg, amg等
    tolerance: 0.0000001 #收敛的残差阈值
    smoother: GaussSeidel # 每一层次的网格上的迭代方法
    cellsInCoarsestLevelNumbers: 10 # 在原网格基础上，指定最糙网格大小
    preSweepNumbers: 0 # 向粗糙网格步进时的迭代步数
    postSweepNumbers: 2 # 向更细网格步进时的迭代步数
    agglometrator: faceAreaPair # 不同网格层的数据融合方法
    mergeLevels: 1 # 控制向粗网格或细网格步进时候的速度，一般设为1
  TurbulenceEquation:
    type: petsc #gaussSeidel,jaccob, pcg, amg�?    
    options:
      kspType: gmres ##gmres, pipefgmres, bcgs, cg, pipecgrr, pipefcg
      pcType: gamg
      amgType: agg
      tolerance: 1e-9    

assemble:
  doubleValue: 32.234

solution: #定义需要求解哪些物理量，每个物理量的初始值等
  velocity: # 单位 m/s
    initialType: fixedValue
    value: 0.0
    x: 0.0
    y: 0.0
    z: 2.0
    dimension: #跟OpenFOAM一样的7元组描述单位
      mass: 0 #默认单位kg
      length: 1  #默认单位m
      time: -1  #默认单位s
      temperature: 0  #默认单位K
      quantity : 0  #默认单位mol
      current: 0  #电流，默认单位A
      luminuousIntensity: 0 #发光强度，默认单位cd
  pressure: # 单位 kg/(m s2)
    initialType: fixedValue
    value: 0.0
    dimension:
      mass: 1 #默认单位kg
      length: -1  #默认单位m
      time: -2  #默认单位s
      temperature: 0  
      quantity : 0 
      current: 0  
      luminuousIntensity: 0
  turbulentKineticEnery: #湍流动能初始场设置，单位:m2/s2
    initialType: fixedValue
    value: 0
    dimension: 
      mass: 0 
      length: 2  
      time: -2  
      temperature: 0  
      quantity : 0  
      current: 0  
      luminuousIntensity: 0 
  turbulentDissipationRate: #湍流耗散率初始场设置,单位:m2/s3
    initialType: fixedValue
    value: 0
    dimension: 
      mass: 0 
      length: 2  
      time: -3  
      temperature: 0  
      quantity : 0  
      current: 0  
      luminuousIntensity: 0 
  turbulencefrequency: #omega初始场设�?单位:1/s
    initialType: fixedValue
    value: 3358.85
    dimension: 
      mass: 0 
      length: 0  
      time: -1  
      temperature: 0  
      quantity : 0  
      current: 0  
      luminuousIntensity: 0 
  temperature: #利用表达式进行初值设置
    initialType: expression  #不太确定类型
    value: 3*x+4*y+5 #将未知量表示为空间坐标的函数进行初始化
    dimension:
      mass: 0 #默认单位kg
      length: 0  #默认单位m
      time: 0  #默认单位s
      temperature: 1  #默认单位K
      quantity : 0  #默认单位mol
      current: 0  #电流，默认单位A
      luminuousIntensity: 0 #发光强度，默认单位cd 

  




  
     






  
